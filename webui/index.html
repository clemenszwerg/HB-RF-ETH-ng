<!DOCTYPE html>
<html lang="de">

<head>
    <title>HB-RF-ETH-ng</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

    <!-- Progressive Web App: makes the WebUI installable ("Add to Home
         screen" on iOS Safari, "Install app" in Chrome/Edge/Brave on
         Android). Once installed it opens in a standalone window without
         browser chrome. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#d96a5a" />
    <!-- iOS Safari does not install from the manifest; it relies on these
         apple-* meta tags + the apple-touch-icon when the user picks
         "Zum Home-Bildschirm" from the share sheet. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HB-RF-ETH-ng" />
    <meta name="application-name" content="HB-RF-ETH-ng" />
    <link rel="apple-touch-icon" href="/icon-256.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="/icon-256.png" />
    <!-- Never cache the HTML shell: it carries the cache-busting ?v=<hash>
         query params that point at the current JS/CSS build. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- New Design and restart sync are permanent defaults. Keep the legacy
         controls out of the rendered settings page while old firmware/API
         fields remain accepted for backward compatibility. -->
    <style>
      .experimental-switch-row { display: none !important; }
      .experimental-warning { align-items: flex-start !important; }
      .experimental-warning > .app-icon { display: none !important; }
      .experimental-warning strong,
      .experimental-warning p { font-size: 0 !important; }
      .experimental-warning strong::after {
        content: "Derzeit nichts vorhanden";
        display: block;
        font-size: 1rem;
        color: var(--color-text);
      }
      .experimental-warning p::after {
        content: "Aktuell sind keine experimentellen Funktionen verfügbar. Das New Design und der Neustart-Sync sind feste Standards für alle Geräte.";
        display: block;
        margin-top: .45rem;
        font-size: .9rem;
        line-height: 1.5;
        color: var(--color-text-secondary);
      }
    </style>
</head>
<body class="newdesign-active">
  <!-- The New Design is now the only supported WebUI. The class is fixed in
       the HTML shell so no retired-layout flash is possible before Vue mounts. -->
  <div id="app"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
