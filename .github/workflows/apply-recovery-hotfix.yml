name: Apply Beta.3 Recovery Hotfix

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@v7
        with:
          ref: fix/recovery-dns-webui-gzip
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Patch source files
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def one(name, old, new):
              p = Path(name); s = p.read_text(encoding='utf-8')
              if old in s: s = s.replace(old, new, 1)
              elif new not in s: raise SystemExit(f'missing pattern in {name}')
              p.write_text(s, encoding='utf-8')

          one('main/settings.cpp',
              '  GET_IP_ADDR(handle, "gateway", _gateway, IPADDR_ANY);\n  GET_IP_ADDR(handle, "dns1", _dns1, IPADDR_ANY);\n  GET_IP_ADDR(handle, "dns2", _dns2, IPADDR_ANY);',
              '''  GET_IP_ADDR(handle, "gateway", _gateway, IPADDR_ANY);

  // Use Cloudflare DNS when no primary DNS was stored. Preserve every
  // non-empty user value and migrate legacy 0.0.0.0 installations once.
  ip4_addr_t defaultDns1;
  IP4_ADDR(&defaultDns1, 1, 1, 1, 1);
  GET_IP_ADDR(handle, "dns1", _dns1, defaultDns1.addr);
  GET_IP_ADDR(handle, "dns2", _dns2, IPADDR_ANY);
  if (_dns1.addr == IPADDR_ANY || _dns1.addr == IPADDR_NONE)
  {
    _dns1 = defaultDns1;
    ESP_ERROR_CHECK_WITHOUT_ABORT(nvs_set_u32(handle, "dns1", _dns1.addr));
    ESP_ERROR_CHECK_WITHOUT_ABORT(nvs_commit(handle));
  }''')

          one('main/system_overview_api.cpp',
              '    add_security_headers(req);\n    httpd_resp_set_type(req, "text/html; charset=utf-8");',
              '''    add_security_headers(req);
    // Recovery is a static self-contained document. Allow only this route's
    // own inline script; the normal New Design retains the strict global CSP.
    httpd_resp_set_hdr(req, "Content-Security-Policy",
                       "default-src 'self'; style-src 'self' 'unsafe-inline'; "
                       "script-src 'self' 'unsafe-inline'; img-src 'self' data:; "
                       "connect-src 'self'; font-src 'self' data:; object-src 'none'; "
                       "base-uri 'self'; form-action 'self'; frame-ancestors 'self';");
    httpd_resp_set_type(req, "text/html; charset=utf-8");''')

          p = Path('main/webui_storage.cpp'); s = p.read_text(encoding='utf-8')
          pairs = [
            ('strcmp(js_encoding->valuestring, "br") == 0', 'strcmp(js_encoding->valuestring, "gzip") == 0'),
            ('strcmp(css_encoding->valuestring, "br") == 0', 'strcmp(css_encoding->valuestring, "gzip") == 0'),
            ('BASE_PATH "/main.js.br"', 'BASE_PATH "/main.js.gz"'),
            ('BASE_PATH "/main.css.br"', 'BASE_PATH "/main.css.gz"'),
            ('{"/main.js", BASE_PATH "/main.js.br", "application/javascript", "br"}', '{"/main.js", BASE_PATH "/main.js.gz", "application/javascript", "gzip"}'),
            ('{"/main.css", BASE_PATH "/main.css.br", "text/css", "br"}', '{"/main.css", BASE_PATH "/main.css.gz", "text/css", "gzip"}'),
            ('// Only the New Design is accepted. Brotli keeps the complete single-file\n    // Vue application inside the existing 320 KiB partition.', '// Only the New Design is accepted. Gzip works on the device private-LAN HTTP origin.'),
          ]
          for old, new in pairs:
              if old in s: s = s.replace(old, new)
              elif new not in s: raise SystemExit(f'missing webui_storage pattern: {old}')
          p.write_text(s, encoding='utf-8')

          p = Path('rename_webui_files.py'); s = p.read_text(encoding='utf-8')
          s = s.replace('"main.js.br",\n        "main.css.br",', '"main.js.gz",\n        "main.css.gz",')
          s = s.replace('"main.js": "br",\n            "main.css": "br",', '"main.js": "gzip",\n            "main.css": "gzip",')
          p.write_text(s, encoding='utf-8')

          one('webui/src/firmwareupdate.vue',
              '''const handleFileSelect = (event) => {
  const selectedFile = event.target.files[0]
  if (selectedFile && selectedFile.name.endsWith('.bin')) {
    file.value = selectedFile
  }
}

const handleDrop = (event) => {
  isDragging.value = false
  const selectedFile = event.dataTransfer.files[0]
  if (selectedFile && selectedFile.name.endsWith('.bin')) {
    file.value = selectedFile
  }
}''',
              '''const WEBUI_IMAGE_SIZE = 0x50000
const isWebUiImage = (selectedFile) => {
  if (!selectedFile) return false
  const name = String(selectedFile.name || '').toLowerCase()
  return name.startsWith('webui_') || name === 'spiffs.bin' || Number(selectedFile.size) === WEBUI_IMAGE_SIZE
}

const acceptFirmwareFile = (selectedFile) => {
  if (!selectedFile || !selectedFile.name.toLowerCase().endsWith('.bin')) return
  if (isWebUiImage(selectedFile)) {
    clearFile()
    uiStore.pushToast({ type: 'warning', title: 'WebUI-Datei erkannt', message: 'Diese Datei unter System → WebUI installieren, nicht als Firmware.', duration: 7000 })
    return
  }
  file.value = selectedFile
}

const handleFileSelect = (event) => acceptFirmwareFile(event.target.files[0])
const handleDrop = (event) => { isDragging.value = false; acceptFirmwareFile(event.dataTransfer.files[0]) }''')

          for name in ('webui/package.json', 'webui/package-lock.json'):
              p = Path(name); s = p.read_text(encoding='utf-8')
              s = s.replace('1.0.0-Beta.1', '1.0.0-Beta.2')
              p.write_text(s, encoding='utf-8')
          PY

      - name: Commit hotfix branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add main/settings.cpp main/system_overview_api.cpp main/webui_storage.cpp rename_webui_files.py webui/src/firmwareupdate.vue webui/package.json webui/package-lock.json
          git commit -m "fix: recover WebUI and default DNS safely"
          git push origin HEAD:fix/recovery-dns-webui-gzip
