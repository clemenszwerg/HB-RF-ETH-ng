name: Apply PR 387 Refactor

on:
  pull_request_target:
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.repository == 'Xerolux/HB-RF-ETH-ng' &&
      github.event.pull_request.number == 387 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'fix/recovery-dns-webui-gzip' &&
      github.event.pull_request.user.login == 'Xerolux'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout guarded head branch
        uses: actions/checkout@v7
        with:
          repository: Xerolux/HB-RF-ETH-ng
          ref: fix/recovery-dns-webui-gzip
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Apply checked-in refactor
        run: |
          set -euo pipefail
          test -f scripts/apply_pr387_refactor.py
          python3 scripts/apply_pr387_refactor.py
          rm scripts/apply_pr387_refactor.py

      - name: Commit guarded branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: keep update checks informational and manual"
          git push origin HEAD:fix/recovery-dns-webui-gzip
