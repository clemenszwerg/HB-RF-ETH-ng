name: Run Brotli Fallback Revision

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@v7
        with:
          ref: fix/recovery-dns-webui-gzip
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Revise external asset fallback
        run: python3 scripts/revise_brotli_fallback.py

      - name: Commit hotfix branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: fall back when Brotli is unsupported"
          git push origin HEAD:fix/recovery-dns-webui-gzip
