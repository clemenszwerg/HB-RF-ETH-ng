name: Release Firmware

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v2.1.7)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false

jobs:
  build-and-release:
    name: Build and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get version
        id: get_version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_TAG=v$VERSION" >> $GITHUB_OUTPUT

          # Detect if triggered by tag push vs workflow_dispatch
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "TRIGGERED_BY_TAG=true" >> $GITHUB_OUTPUT
          else
            echo "TRIGGERED_BY_TAG=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python for version update
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Update all version numbers and changelog
        if: steps.get_version.outputs.TRIGGERED_BY_TAG == 'false'
        run: |
          NEW_VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Updating changelog for $NEW_VERSION..."
          python update_changelog.py "$NEW_VERSION"

          echo "Updating all version numbers to $NEW_VERSION..."
          python update_version.py "$NEW_VERSION"

          echo ""
          echo "Changed files:"
          git status --short

      - name: Commit version changes and create tag
        if: steps.get_version.outputs.TRIGGERED_BY_TAG == 'false'
        run: |
          NEW_VERSION="${{ steps.get_version.outputs.VERSION }}"
          VERSION_TAG="${{ steps.get_version.outputs.VERSION_TAG }}"

          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add -A
            git commit -m "chore: bump version to $NEW_VERSION"
            echo "Committed version changes"
          fi

          if git rev-parse "$VERSION_TAG" >/dev/null 2>&1; then
            echo "Tag $VERSION_TAG already exists locally. Deleting..."
            git tag -d "$VERSION_TAG"
          fi

          git tag -a "$VERSION_TAG" -m "Release $VERSION_TAG"
          git push origin HEAD:main
          git push -f origin "$VERSION_TAG"
          echo "Created and pushed tag $VERSION_TAG"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Build WebUI
        run: |
          cd webui
          npm ci
          npm run build

      - name: Rename WebUI files
        run: python3 rename_webui_files.py

      - name: Setup ESP-IDF v6.0.1
        run: |
          python -m pip install --upgrade pip
          git clone --depth 1 --branch v6.0.1 https://github.com/espressif/esp-idf.git "$HOME/esp-idf"
          git -C "$HOME/esp-idf" submodule update --init --recursive --depth 1
          "$HOME/esp-idf/install.sh" esp32

      - name: Build firmware
        run: |
          . "$HOME/esp-idf/export.sh"
          export IDF_TARGET=esp32
          export SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.hb-rf-eth-ng"
          idf.py build

      - name: Create release directory
        run: |
          mkdir -p release

      - name: Copy firmware files
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"

          if [ -f "build/HB-RF-ETH-ng.bin" ]; then
            cp "build/HB-RF-ETH-ng.bin" "release/firmware_${VERSION}.bin"
            echo "Found HB-RF-ETH-ng.bin"
          else
            FIRST_APP_BIN=$(find build -maxdepth 1 -name "*.bin" | head -n 1)
            if [ -n "$FIRST_APP_BIN" ]; then
              cp "$FIRST_APP_BIN" "release/firmware_${VERSION}.bin"
              echo "Using fallback app binary: $FIRST_APP_BIN"
            else
              echo "ERROR: No app firmware binary found in build/"
              find build -maxdepth 2 -type f || true
              exit 1
            fi
          fi

          cp "build/bootloader/bootloader.bin" release/ 2>/dev/null || true

          if [ -f "build/partition_table/partition-table.bin" ]; then
            cp "build/partition_table/partition-table.bin" "release/partitions.bin"
          fi

          cp version.txt release/

      - name: Generate release notes
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          python generate_release_notes.py "$VERSION" release/RELEASE_NOTES.md

      - name: Create checksums
        run: |
          cd release
          sha256sum *.bin > SHA256SUMS.txt

      - name: Determine release type
        id: release_type
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          IS_PRERELEASE="false"
          IS_DRAFT="false"

          if [ "${{ inputs.prerelease }}" = "true" ]; then
            IS_PRERELEASE="true"
          fi
          if [ "${{ inputs.draft }}" = "true" ]; then
            IS_DRAFT="true"
          fi

          if [[ "$VERSION" =~ [Aa]lpha|[Bb]eta|[Rr][Cc] ]]; then
            IS_PRERELEASE="true"
          fi

          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "IS_DRAFT=$IS_DRAFT" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION_TAG }}
          name: HB-RF-ETH-ng ${{ steps.get_version.outputs.VERSION_TAG }}
          body_path: release/RELEASE_NOTES.md
          files: |
            release/firmware_*.bin
            release/bootloader.bin
            release/partitions.bin
            release/SHA256SUMS.txt
            release/version.txt
          draft: ${{ steps.release_type.outputs.IS_DRAFT }}
          prerelease: ${{ steps.release_type.outputs.IS_PRERELEASE }}
          make_latest: ${{ steps.release_type.outputs.IS_PRERELEASE == 'false' && steps.release_type.outputs.IS_DRAFT == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate update manifest
        if: steps.release_type.outputs.IS_DRAFT == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          VERSION_TAG="${{ steps.get_version.outputs.VERSION_TAG }}"
          IS_PRERELEASE="${{ steps.release_type.outputs.IS_PRERELEASE }}"

          FIRMWARE_FILE="firmware_${VERSION}.bin"
          if [ ! -f "release/${FIRMWARE_FILE}" ]; then
            echo "ERROR: release/${FIRMWARE_FILE} not found"
            ls -la release
            exit 1
          fi

          SHA256="$(awk -v file="${FIRMWARE_FILE}" '$2 == file { print $1 }' release/SHA256SUMS.txt)"
          if [ -z "$SHA256" ]; then
            echo "ERROR: SHA256 for ${FIRMWARE_FILE} not found in release/SHA256SUMS.txt"
            cat release/SHA256SUMS.txt
            exit 1
          fi

          if [ "$IS_PRERELEASE" = "true" ]; then
            CHANNEL="beta"
            MANIFEST_FILE="beta.json"
          else
            CHANNEL="stable"
            MANIFEST_FILE="latest.json"
          fi

          PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p manifest-out
          VERSION="$VERSION" \
          VERSION_TAG="$VERSION_TAG" \
          FIRMWARE_FILE="$FIRMWARE_FILE" \
          SHA256="$SHA256" \
          CHANNEL="$CHANNEL" \
          MANIFEST_FILE="$MANIFEST_FILE" \
          IS_PRERELEASE="$IS_PRERELEASE" \
          PUBLISHED_AT="$PUBLISHED_AT" \
            python3 - <<'PY'
          import json
          import os

          version = os.environ["VERSION"]
          version_tag = os.environ["VERSION_TAG"]
          firmware_file = os.environ["FIRMWARE_FILE"]
          sha256 = os.environ["SHA256"]
          channel = os.environ["CHANNEL"]
          manifest_file = os.environ["MANIFEST_FILE"]
          is_prerelease = os.environ["IS_PRERELEASE"] == "true"

          release_url = f"https://github.com/Xerolux/HB-RF-ETH-ng/releases/tag/{version_tag}"
          manifest = {
              "version": version,
              "channel": channel,
              "isPrerelease": is_prerelease,
              "publishedAt": os.environ["PUBLISHED_AT"],
              "downloadUrl": f"https://github.com/Xerolux/HB-RF-ETH-ng/releases/download/{version_tag}/{firmware_file}",
              "sha256": sha256,
              "releaseUrl": release_url,
              "notesUrl": release_url,
          }

          with open(os.path.join("manifest-out", manifest_file), "w", encoding="utf-8") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")
          PY

          echo "Generated ${MANIFEST_FILE}:"
          cat "manifest-out/${MANIFEST_FILE}"

      - name: Checkout main for manifest update
        if: steps.release_type.outputs.IS_DRAFT == 'false'
        uses: actions/checkout@v7
        with:
          ref: main
          path: manifest-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish update manifest to main
        if: steps.release_type.outputs.IS_DRAFT == 'false'
        working-directory: manifest-repo
        run: |
          MANIFEST_FILE="${{ steps.release_type.outputs.IS_PRERELEASE == 'true' && 'beta.json' || 'latest.json' }}"
          VERSION_TAG="${{ steps.get_version.outputs.VERSION_TAG }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp "../manifest-out/${MANIFEST_FILE}" "${MANIFEST_FILE}"

          git add "${MANIFEST_FILE}"
          if git diff --cached --quiet; then
            echo "${MANIFEST_FILE} already up to date"
            exit 0
          fi

          git commit -m "chore: update ${MANIFEST_FILE} for ${VERSION_TAG}"
          git push origin main
