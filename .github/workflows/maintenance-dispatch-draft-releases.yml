name: Validate full and WebUI-only draft releases

on:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write

jobs:
  dispatch-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      FIRMWARE_TAG: v2.2.5-Beta.2
      FIRMWARE_VERSION: 2.2.5-Beta.2
      WEBUI_VERSION: 1.0.0-Beta.1
      WEBUI_TAG: webui-v1.0.0-Beta.1

    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Remove dispatcher before creating release tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/maintenance-dispatch-draft-releases.yml
          git add .github/workflows/maintenance-dispatch-draft-releases.yml
          git commit -m "ci: remove completed draft release dispatcher"
          git push origin main

      - name: Dispatch full draft release
        id: full
        run: |
          set -euo pipefail
          BEFORE=$(gh run list --repo "$REPO" --workflow release.yml --limit 1 --json databaseId --jq '.[0].databaseId // 0')
          gh workflow run release.yml --repo "$REPO" --ref main \
            -f tag="$FIRMWARE_TAG" \
            -f prerelease=true \
            -f draft=true

          RUN_ID=""
          for _ in $(seq 1 30); do
            LATEST=$(gh run list --repo "$REPO" --workflow release.yml --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')
            if [ "$LATEST" != "0" ] && [ "$LATEST" != "$BEFORE" ]; then RUN_ID="$LATEST"; break; fi
            sleep 2
          done
          test -n "$RUN_ID"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          gh run watch "$RUN_ID" --repo "$REPO" --exit-status --interval 10

      - name: Verify full draft release assets
        run: |
          set -euo pipefail
          gh release view "$FIRMWARE_TAG" --repo "$REPO" --json isDraft,isPrerelease,tagName,name,assets > full-release.json
          python3 - <<'PY'
          import json, os
          data = json.load(open('full-release.json', encoding='utf-8'))
          assert data['isDraft'] is True
          assert data['isPrerelease'] is True
          names = {item['name'] for item in data['assets']}
          expected = {
              f"firmware_{os.environ['FIRMWARE_VERSION']}.bin",
              f"webui_{os.environ['WEBUI_VERSION']}.bin",
              'bootloader.bin', 'partitions.bin', 'SHA256SUMS.txt',
              'firmware-version.txt', 'webui-version.txt',
              'webui-compatibility.json',
          }
          missing = expected - names
          assert not missing, f'Missing full-release assets: {sorted(missing)}'
          PY

      - name: Dispatch WebUI-only draft release
        id: webui
        run: |
          set -euo pipefail
          BEFORE=$(gh run list --repo "$REPO" --workflow release-webui.yml --limit 1 --json databaseId --jq '.[0].databaseId // 0')
          gh workflow run release-webui.yml --repo "$REPO" --ref main \
            -f version="$WEBUI_VERSION" \
            -f min_firmware_version=2.2.5-Beta.1 \
            -f api_version=1 \
            -f prerelease=true \
            -f draft=true

          RUN_ID=""
          for _ in $(seq 1 30); do
            LATEST=$(gh run list --repo "$REPO" --workflow release-webui.yml --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')
            if [ "$LATEST" != "0" ] && [ "$LATEST" != "$BEFORE" ]; then RUN_ID="$LATEST"; break; fi
            sleep 2
          done
          test -n "$RUN_ID"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          gh run watch "$RUN_ID" --repo "$REPO" --exit-status --interval 10

      - name: Verify WebUI-only draft release assets
        run: |
          set -euo pipefail
          gh release view "$WEBUI_TAG" --repo "$REPO" --json isDraft,isPrerelease,tagName,name,assets > webui-release.json
          python3 - <<'PY'
          import json, os
          data = json.load(open('webui-release.json', encoding='utf-8'))
          assert data['isDraft'] is True
          assert data['isPrerelease'] is True
          names = {item['name'] for item in data['assets']}
          expected = {
              f"webui_{os.environ['WEBUI_VERSION']}.bin",
              'SHA256SUMS.txt', 'webui-version.txt',
              'webui-compatibility.json',
          }
          missing = expected - names
          assert not missing, f'Missing WebUI-only assets: {sorted(missing)}'
          assert not any(name.startswith('firmware_') for name in names)
          PY

      - name: Confirm manifests were not published
        run: |
          git fetch origin main
          git show origin/main:latest.json > latest-after.json
          git show origin/main:beta.json > beta-after.json
          python3 - <<'PY'
          import json
          latest = json.load(open('latest-after.json', encoding='utf-8'))
          beta = json.load(open('beta-after.json', encoding='utf-8'))
          assert latest.get('version') != '2.2.5-Beta.2'
          assert beta.get('version') != '2.2.5-Beta.2'
          assert latest.get('webui', {}).get('version') != '1.0.0-Beta.2'
          assert beta.get('webui', {}).get('version') != '1.0.0-Beta.2'
          PY

      - name: Upload validation report
        uses: actions/upload-artifact@v6
        with:
          name: draft-release-validation
          path: |
            full-release.json
            webui-release.json
            latest-after.json
            beta-after.json
          retention-days: 14
