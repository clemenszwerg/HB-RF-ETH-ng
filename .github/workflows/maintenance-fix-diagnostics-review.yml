name: Apply diagnostics review fixes

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout diagnostics branch
        uses: actions/checkout@v7
        with:
          ref: feature/system-overview-theme-logs-v2
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Apply review fixes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          cpp = Path('main/webui.cpp')
          text = cpp.read_text(encoding='utf-8')
          old = '''    uint64_t absolute_offset = 0;
              char chunk[1024];
              esp_err_t result = ESP_OK;
              while (true)
              {
                  const size_t count = LogManager::instance().readChunk(
                      &absolute_offset, chunk, sizeof(chunk));
                  if (count == 0) break;

                  result = httpd_resp_send_chunk(req, chunk, count);
                  if (result != ESP_OK) break;
                  vTaskDelay(pdMS_TO_TICKS(1));
              }

              if (result == ESP_OK)
              {
                  result = httpd_resp_send_chunk(req, nullptr, 0);
              }
              return result;
          '''
          new = '''    const uint64_t snapshot_end = LogManager::instance().getTotalWritten();
              uint64_t absolute_offset = 0;
              constexpr size_t CHUNK_SIZE = 1024;
              char *chunk = static_cast<char *>(malloc(CHUNK_SIZE));
              if (!chunk)
              {
                  return httpd_resp_send_err(req, HTTPD_500_INTERNAL_SERVER_ERROR,
                                             "Could not allocate log download buffer");
              }

              esp_err_t result = ESP_OK;
              while (absolute_offset < snapshot_end)
              {
                  const uint64_t remaining = snapshot_end - absolute_offset;
                  const size_t requested = remaining < CHUNK_SIZE
                      ? static_cast<size_t>(remaining)
                      : CHUNK_SIZE;
                  const size_t count = LogManager::instance().readChunk(
                      &absolute_offset, chunk, requested);
                  if (count == 0) break;

                  result = httpd_resp_send_chunk(req, chunk, count);
                  if (result != ESP_OK) break;
                  vTaskDelay(pdMS_TO_TICKS(1));
              }

              free(chunk);
              if (result == ESP_OK)
              {
                  result = httpd_resp_send_chunk(req, nullptr, 0);
              }
              return result;
          '''
          if old not in text:
              raise SystemExit('log download block not found')
          cpp.write_text(text.replace(old, new, 1), encoding='utf-8')

          vue = Path('webui/src/systemoverview.vue')
          text = vue.read_text(encoding='utf-8')
          old = '''const formatBytes = (value) => {
            const bytes = Number(value) || 0
            if (!bytes) return '—'
            if (bytes < 1024) return `${bytes} B`
            if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`
            return `${(bytes / 1024 / 1024).toFixed(2)} MB`
          }
          '''
          new = '''const formatBytes = (value) => {
            if (value === null || value === undefined || Number.isNaN(Number(value))) return '—'
            const bytes = Number(value)
            if (bytes < 1024) return `${bytes} B`
            if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`
            return `${(bytes / 1024 / 1024).toFixed(2)} MB`
          }
          '''
          if old not in text:
              raise SystemExit('formatBytes block not found')
          text = text.replace(old, new, 1)
          old = '''  } catch (requestError) {
              error.value = requestError.response?.data || requestError.message || 'System overview unavailable'
            } finally {
          '''
          new = '''  } catch (requestError) {
              const responseData = requestError.response?.data
              error.value = responseData?.error
                || (typeof responseData === 'string' ? responseData : '')
                || requestError.message
                || 'System overview unavailable'
            } finally {
          '''
          if old not in text:
              raise SystemExit('overview error block not found')
          vue.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Commit diagnostics fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main/webui.cpp webui/src/systemoverview.vue
          git commit -m "fix: bound log downloads and improve diagnostics display"
          git push origin HEAD:feature/system-overview-theme-logs-v2

      - name: Checkout main for cleanup
        uses: actions/checkout@v7
        with:
          ref: main
          path: main-cleanup
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove maintenance workflow
        working-directory: main-cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/maintenance-fix-diagnostics-review.yml
          git add .github/workflows/maintenance-fix-diagnostics-review.yml
          git commit -m "ci: remove completed diagnostics review workflow"
          git push origin main
