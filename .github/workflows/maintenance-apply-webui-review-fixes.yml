name: Apply final WebUI storage fixes

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v7
        with:
          ref: feature/separate-webui-update
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Apply reviewed fixes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('main/webui_storage.cpp')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  '''#include <stdio.h>\n#include <string.h>''',
                  '''#include <stdio.h>\n#include <stdlib.h>\n#include <string.h>'''
              ),
              (
                  '''    char manifest[MANIFEST_MAX_SIZE + 1] = {};\n    const size_t length = fread(manifest, 1, MANIFEST_MAX_SIZE, file);\n    const bool too_large = !feof(file);\n    const bool read_error = ferror(file);\n    fclose(file);''',
                  '''    char manifest[MANIFEST_MAX_SIZE + 1] = {};\n    const size_t length = fread(manifest, 1, MANIFEST_MAX_SIZE, file);\n    const bool too_large =\n        length == MANIFEST_MAX_SIZE && fgetc(file) != EOF;\n    const bool read_error = ferror(file);\n    fclose(file);'''
              ),
              (
                  '''    uint8_t buffer[UPDATE_BUFFER_SIZE];\n    size_t received = 0;\n    int timeout_retries = 5;''',
                  '''    uint8_t *buffer = static_cast<uint8_t *>(malloc(UPDATE_BUFFER_SIZE));\n    if (!buffer)\n    {\n        webui_storage_update_abort();\n        if (net_locked) xSemaphoreGive(g_net_fetch_mutex);\n        return httpd_resp_send_err(req, HTTPD_500_INTERNAL_SERVER_ERROR,\n                                   "Could not allocate WWW upload buffer");\n    }\n\n    size_t received = 0;\n    int timeout_retries = 5;'''
              ),
              (
                  '''        const size_t wanted = remaining < sizeof(buffer)\n            ? remaining\n            : sizeof(buffer);''',
                  '''        const size_t wanted = remaining < UPDATE_BUFFER_SIZE\n            ? remaining\n            : UPDATE_BUFFER_SIZE;'''
              ),
              (
                  '''    if (result == ESP_OK &&\n        received == static_cast<size_t>(req->content_len))''',
                  '''    free(buffer);\n\n    if (result == ESP_OK &&\n        received == static_cast<size_t>(req->content_len))'''
              ),
              (
                  '''    // Mark first to avoid recursive duplicate registration through the shim.\n    s_registered_server = server;\n    webui_storage_init();''',
                  '''    // Mark first to avoid recursive duplicate registration through the shim.\n    s_registered_server = server;\n    for (auto &route : s_wrapped_routes)\n    {\n        route = WrappedRoute{};\n    }\n    webui_storage_init();'''
              ),
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'expected block not found:\n{old}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove obsolete branch helper
        run: rm -f .github/workflows/apply-final-webui-review-fixes.yml

      - name: Commit feature fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main/webui_storage.cpp .github/workflows/apply-final-webui-review-fixes.yml
          git commit -m "fix: harden WebUI storage update path"
          git push origin HEAD:feature/separate-webui-update

      - name: Checkout main for cleanup
        uses: actions/checkout@v7
        with:
          ref: main
          path: main-cleanup
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove maintenance workflow from main
        working-directory: main-cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/maintenance-apply-webui-review-fixes.yml
          git add .github/workflows/maintenance-apply-webui-review-fixes.yml
          git commit -m "ci: remove completed WebUI maintenance workflow"
          git push origin main
