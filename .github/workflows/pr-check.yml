name: Pull Request Checks

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

permissions:
  contents: write

jobs:
  apply-pr387-refactor:
    name: Apply guarded PR 387 refactor
    if: >-
      github.event.pull_request.number == 387 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'fix/recovery-dns-webui-gzip' &&
      github.event.pull_request.user.login == 'Xerolux'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout guarded head branch
        uses: actions/checkout@v7
        with:
          repository: Xerolux/HB-RF-ETH-ng
          ref: fix/recovery-dns-webui-gzip
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Keep unreachable legacy functions for safe linker GC
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply_pr387_refactor.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('text = text.replace("                            esp_https_ota\\n", "")\n', '')
          text = text.replace('text = text.replace("    void performOnlineUpdate();\\n", "")\n', '')
          text = text.replace('text = remove_function(text, "void UpdateCheck::performOnlineUpdate()", path)\n', '')
          text = text.replace('text = text.replace(\'#include "esp_https_ota.h"\\n\', \'\')\n', '')
          text = text.replace('text = remove_function(text, "static esp_err_t post_ota_url_handler_func", path)\n', '')
          text = text.replace('for inc in [\'#include "esp_https_ota.h"\\n\', \'#include "esp_crt_bundle.h"\\n\', \'#include "ota_config.h"\\n\']:', 'for inc in []:')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Apply checked-in refactor
        id: apply
        continue-on-error: true
        run: |
          set -o pipefail
          test -f scripts/apply_pr387_refactor.py
          python3 scripts/apply_pr387_refactor.py 2>&1 | tee refactor-error.log

      - name: Upload refactor diagnostics
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: pr387-refactor-error
          path: refactor-error.log
          retention-days: 3

      - name: Stop after refactor failure
        if: steps.apply.outcome == 'failure'
        run: exit 1

      - name: Commit guarded branch
        if: steps.apply.outcome == 'success'
        run: |
          rm scripts/apply_pr387_refactor.py refactor-error.log
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: keep update checks informational and manual"
          git push origin HEAD:fix/recovery-dns-webui-gzip

  validate-pr:
    name: Validate Pull Request
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
          requireScope: false
        continue-on-error: true
      - name: Check for version bump
        run: |
          git fetch origin ${{ github.base_ref }}
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:version.txt)
          PR_VERSION=$(cat version.txt)
          echo "Base version: $BASE_VERSION"
          echo "PR version: $PR_VERSION"
          if [ "$BASE_VERSION" = "$PR_VERSION" ]; then
            echo "⚠️ Warning: Version number not updated"
            exit 1
          fi
        continue-on-error: true
      - name: Check file sizes
        run: |
          find . -type f -size +1M -not -path "./.git/*" -not -path "./build/*" -not -path "./webui/node_modules/*" | while read file; do
            echo "⚠️ Large file detected: $file ($(du -h "$file" | cut -f1))"
          done

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json
      - name: Install WebUI dependencies
        run: |
          cd webui
          npm ci
      - name: Check WebUI build
        run: |
          cd webui
          npm run build
      - name: Validate translations and German fallback
        run: node scripts/check-translations.mjs
      - name: Check for console.log statements
        run: |
          cd webui
          if grep -r "console\.log" --include="*.js" --include="*.vue" .; then
            echo "⚠️ Warning: console.log statements found in code"
          fi
        continue-on-error: true
      - name: Validate JSON files
        run: |
          for file in $(find . -name "*.json" -not -path "./node_modules/*" -not -path "./build/*" -not -path "./webui/node_modules/*"); do
            echo "Validating $file"
            python3 -m json.tool "$file" > /dev/null || exit 1
          done

  size-check:
    name: Firmware Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json
      - name: Build WebUI
        run: |
          cd webui
          npm ci
          npm run build
      - name: Rename WebUI files
        run: python3 rename_webui_files.py
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Setup ESP-IDF v6.1-beta1
        run: |
          python -m pip install --upgrade pip
          git clone --depth 1 --branch v6.1-beta1 https://github.com/espressif/esp-idf.git "$HOME/esp-idf"
          git -C "$HOME/esp-idf" submodule update --init --recursive --depth 1
          "$HOME/esp-idf/install.sh" esp32
      - name: Build and check firmware size
        run: |
          . "$HOME/esp-idf/export.sh"
          export IDF_TARGET=esp32
          export SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.hb-rf-eth-ng"
          idf.py build
      - name: Report firmware size
        run: |
          . "$HOME/esp-idf/export.sh"
          export IDF_TARGET=esp32
          export SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.hb-rf-eth-ng"
          echo "### Firmware Size Report" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          idf.py size >> $GITHUB_STEP_SUMMARY 2>&1 || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
      - name: Check WebUI size
        run: |
          echo "### WebUI Size Report" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          du -h webui/dist/*.gz >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
