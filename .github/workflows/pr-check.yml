name: Pull Request Checks

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read

jobs:
  validate-pr:
    name: Validate Pull Request
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
          requireScope: false
        continue-on-error: true
      - name: Check for version bump
        run: |
          git fetch origin ${{ github.base_ref }}
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:version.txt)
          PR_VERSION=$(cat version.txt)
          echo "Base version: $BASE_VERSION"
          echo "PR version: $PR_VERSION"
          if [ "$BASE_VERSION" = "$PR_VERSION" ]; then
            echo "⚠️ Warning: Version number not updated"
            exit 1
          fi
        continue-on-error: true
      - name: Check file sizes
        run: |
          find . -type f -size +1M -not -path "./.git/*" -not -path "./build/*" -not -path "./webui/node_modules/*" | while read file; do
            echo "⚠️ Large file detected: $file ($(du -h "$file" | cut -f1))"
          done

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json
      - name: Install WebUI dependencies
        run: |
          cd webui
          npm ci
      - name: Check WebUI build
        run: |
          cd webui
          npm run build
      - name: Validate translations and German fallback
        run: node scripts/check-translations.mjs
      - name: Check for console.log statements
        run: |
          cd webui
          if grep -r "console\.log" --include="*.js" --include="*.vue" .; then
            echo "⚠️ Warning: console.log statements found in code"
          fi
        continue-on-error: true
      - name: Validate JSON files
        run: |
          for file in $(find . -name "*.json" -not -path "./node_modules/*" -not -path "./build/*" -not -path "./webui/node_modules/*"); do
            echo "Validating $file"
            python3 -m json.tool "$file" > /dev/null || exit 1
          done

  size-check:
    name: Firmware Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json
      - name: Build WebUI
        run: |
          cd webui
          npm ci
          npm run build
      - name: Rename WebUI files
        run: python3 rename_webui_files.py
      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.13'
      - name: Setup ESP-IDF v6.1-beta1
        run: |
          python -m pip install --upgrade pip
          git clone --depth 1 --branch v6.1-beta1 https://github.com/espressif/esp-idf.git "$HOME/esp-idf"
          git -C "$HOME/esp-idf" submodule update --init --recursive --depth 1
          "$HOME/esp-idf/install.sh" esp32
      - name: Build and check firmware size
        run: |
          . "$HOME/esp-idf/export.sh"
          export IDF_TARGET=esp32
          export SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.hb-rf-eth-ng"
          idf.py build
      - name: Report firmware size
        run: |
          . "$HOME/esp-idf/export.sh"
          export IDF_TARGET=esp32
          export SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.hb-rf-eth-ng"
          echo "### Firmware Size Report" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          idf.py size >> $GITHUB_STEP_SUMMARY 2>&1 || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
      - name: Check WebUI size
        run: |
          echo "### WebUI Size Report" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          du -h webui/dist/*.gz >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
