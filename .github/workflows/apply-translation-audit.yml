name: Apply German translation fallback audit

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout translation branch
        uses: actions/checkout@v7
        with:
          ref: fix/german-translation-fallback
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Enforce German fallback
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          replacements = {
              'webui/src/main.js': [("fallbackLocale: 'en'", "fallbackLocale: 'de'")],
              'webui/src/locales/index.js': [('// Default to English', '// Default to German'), ("return 'en'", "return 'de'")],
              'webui/src/theme.vue': [('translations[locale.value] || translations.en', 'translations[locale.value] || translations.de')],
              'webui/src/systemoverview.vue': [('translations[locale.value] || translations.en', 'translations[locale.value] || translations.de')],
              'webui/src/webuiupdate.vue': [('translations[locale.value] || translations.en', 'translations[locale.value] || translations.de')],
          }
          for name, pairs in replacements.items():
              path = Path(name)
              text = path.read_text(encoding='utf-8')
              for old, new in pairs:
                  if old not in text:
                      raise SystemExit(f'Expected fallback not found in {name}: {old}')
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')

          workflow = Path('.github/workflows/pr-check.yml')
          text = workflow.read_text(encoding='utf-8')
          marker = "      - name: Check for console.log statements\n"
          step = "      - name: Validate translations and German fallback\n        run: node scripts/check-translations.mjs\n\n"
          if step not in text:
              if marker not in text:
                  raise SystemExit('PR check insertion point not found')
              workflow.write_text(text.replace(marker, step + marker, 1), encoding='utf-8')
          PY

          mkdir -p scripts
          cat > scripts/check-translations.mjs <<'EOF'
          import fs from 'node:fs'
          import path from 'node:path'
          import { fileURLToPath } from 'node:url'

          const root = path.resolve(path.dirname(fileURLToPath(import.meta.url)), '..')
          const localeDir = path.join(root, 'webui', 'src', 'locales')
          const sourceDir = path.join(root, 'webui', 'src')
          let failed = false
          const fail = (message) => { console.error(`Translation check failed: ${message}`); failed = true }

          const loadLocale = (file) => {
            const source = fs.readFileSync(file, 'utf8')
            const transformed = source.replace(/^\s*export\s+default\s+/, 'return ')
            if (transformed === source) throw new Error(`Unsupported locale module: ${file}`)
            return Function(`"use strict";\n${transformed}`)()
          }
          const flatten = (value, prefix = '', keys = new Set()) => {
            if (!value || typeof value !== 'object' || Array.isArray(value)) {
              if (prefix) keys.add(prefix)
              return keys
            }
            for (const [key, nested] of Object.entries(value)) {
              const full = prefix ? `${prefix}.${key}` : key
              if (nested && typeof nested === 'object' && !Array.isArray(nested)) flatten(nested, full, keys)
              else keys.add(full)
            }
            return keys
          }
          const walk = (directory) => fs.readdirSync(directory, { withFileTypes: true }).flatMap((entry) => {
            const file = path.join(directory, entry.name)
            return entry.isDirectory() ? walk(file) : /\.(?:js|vue)$/.test(entry.name) ? [file] : []
          })

          const localeFiles = fs.readdirSync(localeDir).filter((name) => /^[a-z]{2}\.js$/.test(name)).sort()
          const localeKeys = Object.fromEntries(localeFiles.map((name) => [name.slice(0, 2), flatten(loadLocale(path.join(localeDir, name)))]))
          const german = localeKeys.de
          if (!german) fail('webui/src/locales/de.js is missing')

          const used = new Set()
          const callPattern = /(?:^|[^\w$])(?:t|\$t|translate|i18n\.global\.t)\(\s*(['"`])([^'"`]+)\1/gm
          for (const file of walk(sourceDir)) {
            const source = fs.readFileSync(file, 'utf8')
            for (const match of source.matchAll(callPattern)) if (!match[2].includes('${')) used.add(match[2])
          }

          if (german) {
            const missingGerman = [...used].filter((key) => !german.has(key)).sort()
            if (missingGerman.length) fail(`German keys missing:\n  ${missingGerman.join('\n  ')}`)
            for (const [code, keys] of Object.entries(localeKeys)) {
              if (code === 'de') continue
              const absentInGerman = [...keys].filter((key) => !german.has(key)).sort()
              if (absentInGerman.length) fail(`${code}.js has keys missing in de.js:\n  ${absentInGerman.join('\n  ')}`)
              const missing = [...german].filter((key) => !keys.has(key))
              if (missing.length) console.warn(`${code}.js misses ${missing.length} German reference keys; fallback is German.`)
            }
          }

          const main = fs.readFileSync(path.join(sourceDir, 'main.js'), 'utf8')
          const index = fs.readFileSync(path.join(localeDir, 'index.js'), 'utf8')
          if (!/fallbackLocale\s*:\s*['"]de['"]/.test(main)) fail('fallbackLocale must be de')
          if (/fallbackLocale\s*:\s*['"]en['"]/.test(main)) fail('English Vue-I18n fallback is forbidden')
          if (!/Default to German[\s\S]*return\s+['"]de['"]/.test(index)) fail('Unknown browser locales must default to German')

          for (const file of walk(sourceDir)) {
            const source = fs.readFileSync(file, 'utf8')
            if (/(?:\|\||\?\?)\s*(?:translations|messages)\.en\b/.test(source)) {
              fail(`English local fallback in ${path.relative(root, file)}`)
            }
          }

          if (failed) process.exit(1)
          console.log(`Translation check passed: ${used.size} used keys, ${german.size} German keys, ${localeFiles.length} locales.`)
          EOF

      - name: Commit translation branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add webui/src/main.js webui/src/locales/index.js webui/src/theme.vue webui/src/systemoverview.vue webui/src/webuiupdate.vue scripts/check-translations.mjs .github/workflows/pr-check.yml
          git commit -m "fix(i18n): use German as the only fallback"
          git push origin HEAD:fix/german-translation-fallback

      - name: Remove maintenance workflow
        run: |
          git fetch origin main
          git checkout -B main origin/main
          git rm .github/workflows/apply-translation-audit.yml
          git commit -m "ci: remove completed translation maintenance workflow"
          git push origin main
