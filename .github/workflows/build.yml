name: Build Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Build WebUI
        run: |
          cd webui
          npm ci
          npm run build

      - name: Rename WebUI files
        run: python3 rename_webui_files.py

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Setup ESP-IDF v6.0
        run: |
          python -m pip install --upgrade pip
          git clone --depth 1 --branch v6.0 https://github.com/espressif/esp-idf.git "$HOME/esp-idf"
          git -C "$HOME/esp-idf" submodule update --init --recursive --depth 1
          python -m pip install -r "$HOME/esp-idf/requirements.txt"

      - name: Build firmware
        run: |
          . "$HOME/esp-idf/export.sh"
          export IDF_TARGET=esp32
          export SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.hb-rf-eth-ng"
          idf.py build

      - name: Report firmware size
        run: |
          . "$HOME/esp-idf/export.sh"
          export IDF_TARGET=esp32
          export SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.hb-rf-eth-ng"
          echo "### Firmware Size Report" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          idf.py size >> $GITHUB_STEP_SUMMARY 2>&1 || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v7
        with:
          name: firmware
          path: |
            build/*.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
          retention-days: 30

      - name: Upload WebUI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: webui-dist
          path: webui/dist/
          retention-days: 7
