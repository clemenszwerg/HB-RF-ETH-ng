name: Rebuild Firmware Archive

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 0'

permissions:
  contents: write

jobs:
  rebuild-archive:
    name: Rebuild archive.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate archive manifest from GitHub releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime, timezone

          repo = "Xerolux/HB-RF-ETH-ng"
          token = os.environ.get("GITHUB_TOKEN", "")
          releases = []
          page = 1

          while True:
              url = f"https://api.github.com/repos/{repo}/releases?per_page=100&page={page}"
              req = urllib.request.Request(url)
              req.add_header("Accept", "application/vnd.github+json")
              if token:
                  req.add_header("Authorization", f"Bearer {token}")
              with urllib.request.urlopen(req, timeout=30) as response:
                  batch = json.load(response)
              if not batch:
                  break
              releases.extend(batch)
              page += 1

          archive_releases = []
          for release in releases:
              if release.get("draft"):
                  continue

              assets = release.get("assets") or []
              bin_assets = [
                  asset for asset in assets
                  if str(asset.get("name", "")).lower().endswith(".bin")
                  and str(asset.get("name", "")).lower().startswith("firmware_")
              ]
              if not bin_assets:
                  bin_assets = [
                      asset for asset in assets
                      if str(asset.get("name", "")).lower().endswith(".bin")
                  ]
              if not bin_assets:
                  continue

              asset = bin_assets[0]
              tag_name = release.get("tag_name") or ""
              version = tag_name[1:] if tag_name.lower().startswith("v") else tag_name

              archive_releases.append({
                  "version": version,
                  "channel": "beta" if release.get("prerelease") else "stable",
                  "isPrerelease": bool(release.get("prerelease")),
                  "publishedAt": release.get("published_at") or release.get("created_at") or "",
                  "downloadUrl": asset.get("browser_download_url") or "",
                  "releaseUrl": release.get("html_url") or f"https://github.com/{repo}/releases/tag/{tag_name}",
                  "notesUrl": release.get("html_url") or f"https://github.com/{repo}/releases/tag/{tag_name}",
                  "tagName": tag_name,
                  "name": release.get("name") or f"HB-RF-ETH-ng {tag_name}",
                  "prerelease": bool(release.get("prerelease")),
                  "assetName": asset.get("name") or "",
                  "assetSize": asset.get("size") or 0,
                  "notes": release.get("body") or "",
              })

          archive_releases.sort(key=lambda item: item.get("publishedAt") or "", reverse=True)
          archive = {
              "schema": 1,
              "updatedAt": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "releases": archive_releases[:50],
          }

          with open("archive.json", "w", encoding="utf-8") as f:
              json.dump(archive, f, indent=2, ensure_ascii=False)
              f.write("\n")
          PY

      - name: Commit archive manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add archive.json
          if git diff --cached --quiet; then
            echo "archive.json already up to date"
            exit 0
          fi

          git commit -m "chore: rebuild firmware archive"
          git push origin main
