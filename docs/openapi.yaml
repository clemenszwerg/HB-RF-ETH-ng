openapi: 3.0.3
info:
  title: HB-RF-ETH API
  description: |
    REST API for HB-RF-ETH-ng firmware v2.2.3-Beta.8 - Homematic RF-to-Ethernet bridge

    This API provides endpoints for device configuration, monitoring, and firmware management.

    ## Authentication
    All endpoints except `/login.json` require authentication using a bearer token.
    Obtain a token by posting username and password credentials to `/login.json`.

    ## Security Note
    The default username is `admin`. The initial password is `admin`. **Change the password immediately after first login.**

  version: '2.2.5-Beta.11'
  contact:
    name: HB-RF-ETH Project
    url: https://github.com/Xerolux/HB-RF-ETH-ng
  license:
    name: CC BY-NC-SA 4.0
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/

servers:
  - url: http://{deviceIP}
    description: Device HTTP server
    variables:
      deviceIP:
        default: 192.168.1.100
        description: IP address of the HB-RF-ETH device

tags:
  - name: Authentication
    description: Login and authentication endpoints
  - name: System
    description: System information and control
  - name: Settings
    description: Device configuration management
  - name: Monitoring
    description: MQTT, CheckMK, Prometheus, Syslog and notification configuration
  - name: Firmware
    description: Firmware update management

security:
  - TokenAuth: []

paths:
  /login.json:
    post:
      tags:
        - Authentication
      summary: Authenticate and obtain token
      description: Login with admin password to obtain an access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  example: admin
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  isAuthenticated:
                    type: boolean
                    example: true
                  token:
                    type: string
                    example: a1b2c3d4e5f6...
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  isAuthenticated:
                    type: boolean
                    example: false

  /sysinfo.json:
    get:
      tags:
        - System
      summary: Get system information
      description: Retrieve device information including firmware version, hardware details, and radio module info
      responses:
        '200':
          description: System information retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  sysInfo:
                    $ref: '#/components/schemas/SystemInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /settings.json:
    get:
      tags:
        - Settings
      summary: Get device settings
      description: Retrieve current device configuration
      responses:
        '200':
          description: Settings retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    $ref: '#/components/schemas/Settings'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Settings
      summary: Update device settings
      description: Update device configuration. All fields are optional.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Settings'
      responses:
        '200':
          description: Settings updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    $ref: '#/components/schemas/Settings'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/monitoring:
    get:
      tags:
        - Monitoring
      summary: Get monitoring configuration
      description: Retrieve MQTT, CheckMK, Prometheus, Syslog and notification configuration
      responses:
        '200':
          description: Monitoring configuration retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitoringConfig'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Monitoring
      summary: Update monitoring configuration
      description: Update MQTT, CheckMK, Prometheus, Syslog and notification settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonitoringConfig'
      responses:
        '200':
          description: Configuration updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /ota_update:
    post:
      tags:
        - Firmware
      summary: Upload firmware update
      description: Upload and install a firmware update. The device restarts automatically after a successful upload.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Firmware binary file
      responses:
        '200':
          description: Firmware uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/restart:
    post:
      tags:
        - System
      summary: Restart device
      description: Restart the device immediately. HTTP connection will be closed.
      responses:
        '200':
          description: Device restarting
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: restarting
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/check_update:
    get:
      tags:
        - Firmware
      summary: Get cached release snapshot
      description: >
        Return the cached snapshot of the latest release known to the firmware.
        Refreshed automatically every 24 h by a background timer and on demand
        via POST /api/check_update. This handler never opens a network
        connection, so it is safe to poll.
      responses:
        '200':
          description: Cached release snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  currentVersion:
                    type: string
                  latestVersion:
                    type: string
                  updateAvailable:
                    type: boolean
                  isPrerelease:
                    type: boolean
                  fetchedAt:
                    type: number
                    description: Unix epoch millis of the last successful fetch
                  betaChannel:
                    type: boolean
                  fetchInProgress:
                    type: boolean
                  error:
                    type: string
                    nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Firmware
      summary: Trigger an immediate release-check fetch
      description: >
        Arm an immediate online manifest fetch on the device (the WebUI
        "Jetzt nach Updates suchen" button). Ignores the 24 h automatic window
        but enforces a 60 s cooldown and never stacks onto a running fetch.
        The actual GitHub request runs in a detached task; this handler
        returns 202 immediately. Poll GET /api/check_update (fetchInProgress)
        until it clears, then read the refreshed snapshot.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '202':
          description: Fetch armed (or refused due to cooldown / in-flight fetch)
          content:
            application/json:
              schema:
                type: object
                properties:
                  triggered:
                    type: boolean
                    description: true when a new fetch was armed
                  fetchInProgress:
                    type: boolean
                    description: true while a fetch is in flight
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    TokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: 'Token authentication. Format: "Token YOUR_TOKEN_HERE"'

  schemas:
    SystemInfo:
      type: object
      properties:
        serial:
          type: string
          description: Device serial number
          example: HB-RF-ETH-ABC123
        currentVersion:
          type: string
          description: Currently installed firmware version
          example: 2.0.0
        latestVersion:
          type: string
          description: Latest available firmware version
          example: 2.1.12
        rawUartRemoteAddress:
          type: string
          description: Remote address for raw UART connection
          example: 192.168.1.50:2000
        memoryUsage:
          type: number
          format: float
          description: Memory usage percentage
          example: 5.8
        cpuUsage:
          type: number
          format: float
          description: CPU usage percentage
          example: 12.5
        radioModuleType:
          type: string
          description: Type of radio module
          enum:
            - RPI-RF-MOD
            - HM-MOD-RPI-PCB
            - '-'
          example: RPI-RF-MOD
        radioModuleSerial:
          type: string
          description: Radio module serial number
          example: SGXXXXXX
        radioModuleBidCosRadioMAC:
          type: string
          description: BidCos radio MAC address
          example: '0xABCDEF'
        radioModuleHmIPRadioMAC:
          type: string
          description: HmIP radio MAC address
          example: '0x123456'
        radioModuleSGTIN:
          type: string
          description: Radio module SGTIN
          example: '3014F711A000000000XXXXXX'

    Settings:
      type: object
      properties:
        hostname:
          type: string
          description: Device hostname (max 63 chars, alphanumeric + hyphen + dot)
          maxLength: 63
          pattern: '^[a-zA-Z0-9][a-zA-Z0-9.-]*$'
          example: HB-RF-ETH-001
        useDHCP:
          type: boolean
          description: Enable DHCP for network configuration
          example: true
        localIP:
          type: string
          format: ipv4
          description: Static IP address (used when DHCP is disabled)
          example: 192.168.1.100
        netmask:
          type: string
          format: ipv4
          description: Network mask (used when DHCP is disabled)
          example: 255.255.255.0
        gateway:
          type: string
          format: ipv4
          description: Default gateway (used when DHCP is disabled)
          example: 192.168.1.1
        dns1:
          type: string
          format: ipv4
          description: Primary DNS server
          example: 8.8.8.8
        dns2:
          type: string
          format: ipv4
          description: Secondary DNS server
          example: 8.8.4.4
        timesource:
          type: integer
          description: Time source selection
          enum: [0, 1, 2]
          example: 0
          x-enum-descriptions:
            - 0 = NTP
            - 1 = DCF77
            - 2 = GPS
        dcfOffset:
          type: integer
          description: DCF77 signal offset in microseconds
          minimum: -60000
          maximum: 60000
          example: 40000
        gpsBaudrate:
          type: integer
          description: GPS module baud rate
          enum: [4800, 9600, 19200, 38400, 57600, 115200]
          example: 9600
        ntpServer:
          type: string
          description: NTP server hostname or IP address
          maxLength: 64
          example: pool.ntp.org
        ledBrightness:
          type: integer
          description: LED brightness percentage
          minimum: 0
          maximum: 100
          example: 100
        betaChannel:
          type: boolean
          description: When true, the update check considers GitHub pre-releases
          example: false
        flashPause:
          type: boolean
          description: >-
            When true, a system restart holds the Ethernet PHY in hardware reset
            for ~35 seconds so a connected CCU's link-loss watchdog can trigger
            a clean CCU restart. Default false.
          example: false
        systemLogEnabled:
          type: boolean
          description: >-
            Whether the in-device ring-buffer system log is active (managed from
            the System Log page; returned here for visibility).
          example: false
          readOnly: true

    MonitoringConfig:
      type: object
      properties:
        mqtt:
          type: object
          description: MQTT client configuration
          properties:
            enabled:
              type: boolean
              description: Enable MQTT client
              example: false
            server:
              type: string
              description: MQTT broker hostname or IP address
              example: mqtt.local
            port:
              type: integer
              description: MQTT broker port
              minimum: 1
              maximum: 65535
              example: 1883
            user:
              type: string
              description: MQTT username
              example: hb-rf-eth
            password:
              type: string
              description: MQTT password. Empty values keep the stored password unchanged.
              example: secret
            topicPrefix:
              type: string
              description: Topic prefix for published entities and status messages
              example: hb-rf-eth
            haDiscoveryEnabled:
              type: boolean
              description: Enable Home Assistant auto-discovery
              example: false
            haDiscoveryPrefix:
              type: string
              description: Discovery prefix used for Home Assistant
              example: homeassistant
            tlsEnable:
              type: boolean
              description: Connect to broker via TLS (port 8883 by default)
              example: false
            tlsSkipVerify:
              type: boolean
              description: Skip TLS cert/hostname verification (INSECURE, lab only)
              example: false
            tlsCaCerts:
              type: string
              description: Custom CA bundle (PEM). Empty = built-in Mozilla bundle. Write-only.
              format: pem
            tlsCaCertsClear:
              type: boolean
              description: Drop any stored custom CA bundle
            tlsCertfile:
              type: string
              description: mTLS client certificate (PEM). Write-only.
              format: pem
            tlsCertfileClear:
              type: boolean
              description: Drop any stored mTLS client certificate
            tlsKeyfile:
              type: string
              description: mTLS client key (PEM). Write-only.
              format: pem
            tlsKeyfileClear:
              type: boolean
              description: Drop any stored mTLS client key
            tlsCaCertsSet:
              type: boolean
              description: Read-only flag indicating a custom CA bundle is stored
              readOnly: true
            tlsCertfileSet:
              type: boolean
              description: Read-only flag indicating a client cert is stored
              readOnly: true
            tlsKeyfileSet:
              type: boolean
              description: Read-only flag indicating a client key is stored
              readOnly: true
            commandEnabled:
              type: boolean
              description: >
                When false, the device does not subscribe to
                <prefix>/command/# and silently drops every command.
                Default true.
              example: true
            commandToken:
              type: string
              description: >
                Shared-secret that command payloads must match exactly.
                Allowed charset: A-Z a-z 0-9 - _ . (8..63 chars).
                Write-only; the stored value is never returned by the API.
              maxLength: 63
              writeOnly: true
            commandTokenClear:
              type: boolean
              description: Drop any stored command token
            commandTokenSet:
              type: boolean
              description: Read-only flag indicating a command token is configured
              readOnly: true
        checkmk:
          type: object
          description: CheckMK agent configuration
          properties:
            enabled:
              type: boolean
              description: Enable CheckMK agent
              example: false
            port:
              type: integer
              description: CheckMK agent port
              minimum: 1
              maximum: 65535
              example: 6556
            allowedHosts:
              type: string
              description: Comma-separated list of allowed IP addresses/ranges
              example: 192.168.1.0/24,10.0.0.5
        prometheus:
          type: object
          description: Prometheus metrics exporter configuration
          properties:
            enabled:
              type: boolean
              description: Enable the Prometheus exporter
              example: false
            port:
              type: integer
              description: HTTP port for /metrics (default 9100)
              minimum: 1
              maximum: 65535
              example: 9100
            allowedHosts:
              type: string
              description: Comma-separated source-IP allowlist (Prometheus carries no auth)
              example: 192.168.1.0/24
        syslog:
          type: object
          description: Syslog forwarding configuration
          properties:
            enabled:
              type: boolean
              description: Enable Syslog forwarding
              example: false
            server:
              type: string
              description: Syslog server hostname or IP
              example: syslog.local
            port:
              type: integer
              description: Syslog server port (default 514)
              minimum: 1
              maximum: 65535
              example: 514
            transport:
              type: integer
              description: Transport mode
              enum: [0, 1, 2]
              example: 0
              x-enum-descriptions:
                - 0 = UDP
                - 1 = TCP
                - 2 = TLS-over-TCP (serialized on the net-fetch mutex; deferred during OTA)
            minSeverity:
              type: integer
              description: Minimum severity to forward (0 = EMERG ... 7 = DEBUG)
              minimum: 0
              maximum: 7
              example: 5
            hostname:
              type: string
              description: Hostname tag override; empty = device hostname
              example: ''
        notify:
          type: object
          description: Event notification configuration (webhook / Telegram / email)
          properties:
            enabled:
              type: boolean
              description: Master switch for notifications
              example: false
            channels:
              type: integer
              description: Bitmask of active channels (1 = webhook, 2 = Telegram, 4 = email)
              example: 0
            cooldownSeconds:
              type: integer
              description: Per-event-type dedupe window in seconds
              minimum: 0
              example: 300
            webhookUrl:
              type: string
              description: HTTP POST target for webhook notifications
              example: ''
            webhookSecretSet:
              type: boolean
              description: Read-only flag indicating a webhook secret is stored
              readOnly: true
            telegramTokenSet:
              type: boolean
              description: Read-only flag indicating a Telegram bot token is stored
              readOnly: true
            telegramChatId:
              type: string
              description: Telegram target chat ID
              example: ''
            smtpServer:
              type: string
              description: SMTP relay hostname or IP
              example: ''
            smtpPort:
              type: integer
              description: SMTP relay port
              minimum: 1
              maximum: 65535
              example: 587
            smtpTls:
              type: integer
              description: SMTP transport security
              enum: [0, 1, 2]
              example: 1
              x-enum-descriptions:
                - 0 = none (plaintext)
                - 1 = STARTTLS
                - 2 = implicit TLS
            smtpUser:
              type: string
              description: SMTP authentication username (optional)
              example: ''
            smtpPasswordSet:
              type: boolean
              description: Read-only flag indicating an SMTP password is stored
              readOnly: true
            smtpFrom:
              type: string
              description: SMTP envelope sender
              example: ''
            smtpTo:
              type: string
              description: SMTP envelope recipient
              example: ''

  responses:
    Unauthorized:
      description: Unauthorized - invalid or missing authentication token
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Unauthorized

    BadRequest:
      description: Bad request - invalid input data
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Invalid request

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Internal server error
